<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>투게더리안 - 회원가입</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="brand-icon">🤝</div>
        <h1>투게더리안</h1>
        <p>계정을 만들고 스터디를 시작하세요</p>
      </div>

      <form class="auth-form" id="signup-form">
        <div class="form-group">
          <label class="form-label" for="name">이름 <span class="required">*</span></label>
          <input
            type="text"
            id="name"
            class="form-control"
            placeholder="이름을 입력하세요"
            required
            autocomplete="name"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="email">이메일 <span class="required">*</span></label>
          <input
            type="email"
            id="email"
            class="form-control"
            placeholder="이메일을 입력하세요"
            required
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">비밀번호 <span class="required">*</span></label>
          <input
            type="password"
            id="password"
            class="form-control"
            placeholder="8자 이상의 비밀번호"
            required
            minlength="8"
            autocomplete="new-password"
          />
          <span class="form-hint">영문, 숫자 조합 8자 이상</span>
        </div>

        <div class="form-group">
          <label class="form-label" for="password-confirm">비밀번호 확인 <span class="required">*</span></label>
          <input
            type="password"
            id="password-confirm"
            class="form-control"
            placeholder="비밀번호를 다시 입력하세요"
            required
            autocomplete="new-password"
          />
        </div>

        <p id="error-msg" class="form-error" style="display:none;"></p>

        <button type="submit" class="btn btn-primary btn-lg w-full" id="signup-btn">
          회원가입
        </button>
      </form>

      <div class="auth-footer">
        이미 계정이 있으신가요?
        <a href="index.html">로그인</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { registerUser, redirectIfLoggedIn } from "./js/auth.js";
    import { showLoading, hideLoading } from "./js/utils.js";

    redirectIfLoggedIn();

    document.getElementById("signup-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const passwordConfirm = document.getElementById("password-confirm").value;
      const errorMsg = document.getElementById("error-msg");
      const btn = document.getElementById("signup-btn");

      errorMsg.style.display = "none";

      if (!name) {
        errorMsg.textContent = "이름을 입력해주세요.";
        errorMsg.style.display = "block";
        return;
      }

      if (password !== passwordConfirm) {
        errorMsg.textContent = "비밀번호가 일치하지 않습니다.";
        errorMsg.style.display = "block";
        return;
      }

      btn.disabled = true;
      btn.textContent = "가입 중...";
      showLoading();

      try {
        await registerUser(name, email, password);
        window.location.href = "dashboard.html";
      } catch (err) {
        hideLoading();
        btn.disabled = false;
        btn.textContent = "회원가입";
        let msg = "회원가입에 실패했습니다.";
        if (err.code === "auth/email-already-in-use") {
          msg = "이미 사용 중인 이메일입니다.";
        } else if (err.code === "auth/weak-password") {
          msg = "비밀번호는 6자 이상이어야 합니다.";
        } else if (err.code === "auth/invalid-email") {
          msg = "유효하지 않은 이메일 형식입니다.";
        }
        errorMsg.textContent = msg;
        errorMsg.style.display = "block";
      }
    });
  </script>
</body>
</html>
