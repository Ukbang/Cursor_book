<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>투게더리안 - 스터디 개설</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="dashboard.html" class="navbar-brand">
        <div class="brand-icon">🤝</div>
        투게더리안
      </a>
      <ul class="navbar-nav">
        <li><a href="dashboard.html">🏠 홈</a></li>
        <li><a href="create-study.html" class="active">✏️ 스터디 개설</a></li>
        <li><a href="manage-study.html">📋 내 스터디</a></li>
        <li><div id="nav-user"></div></li>
        <li><button id="logout-btn" class="btn btn-secondary btn-sm">로그아웃</button></li>
      </ul>
    </div>
  </nav>

  <div class="page-container-sm">
    <div class="page-header">
      <a href="dashboard.html" class="back-btn">← 목록으로</a>
      <h2 style="margin-top:16px;">스터디 개설</h2>
      <p class="text-muted" style="margin-top:4px;font-size:0.9rem;">새로운 스터디를 만들고 멤버를 모집해보세요</p>
    </div>

    <!-- 개설 가능 개수 배지 -->
    <div id="quota-badge" class="quota-badge">
      ✨ 스터디 개설 가능: <strong id="quota-text">로딩 중...</strong>
    </div>

    <div class="create-form-card">
      <form id="create-form">

        <!-- 기본 정보 섹션 -->
        <div class="form-section">
          <div class="form-section-title">기본 정보</div>
          <div style="display:flex;flex-direction:column;gap:16px;">
            <div class="form-group">
              <label class="form-label" for="title">스터디 제목 <span class="required">*</span></label>
              <input
                type="text"
                id="title"
                class="form-control"
                placeholder="예: 알고리즘 마스터 스터디"
                required
                maxlength="60"
              />
            </div>

            <div class="form-group">
              <label class="form-label" for="category">카테고리 <span class="required">*</span></label>
              <select id="category" class="form-control" required>
                <option value="">카테고리 선택</option>
                <option value="programming">💻 프로그래밍</option>
                <option value="language">🌍 어학</option>
                <option value="certificate">📜 자격증</option>
                <option value="employment">💼 취업</option>
                <option value="reading">📚 독서</option>
                <option value="etc">✨ 기타</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label" for="description">
                스터디 소개
                <span class="required">*</span>
              </label>
              <div class="ai-btn-wrapper">
                <textarea
                  id="description"
                  class="form-control"
                  rows="5"
                  placeholder="스터디 목표, 학습 방식, 참여 조건 등을 설명해주세요..."
                  required
                  maxlength="1000"
                ></textarea>
                <button type="button" class="btn-ai" id="ai-gen-btn" title="AI로 소개글 자동 생성">
                  <span class="ai-icon">✨</span>
                  <span>AI 생성</span>
                </button>
              </div>
              <span class="form-hint">제목과 카테고리를 먼저 입력하면 AI가 소개글을 자동으로 작성해드립니다</span>
            </div>
          </div>
        </div>

        <!-- 일정/장소 섹션 -->
        <div class="form-section">
          <div class="form-section-title">일정 및 장소</div>
          <div style="display:flex;flex-direction:column;gap:16px;">
            <div class="form-group">
              <label class="form-label" for="schedule">모임 일정</label>
              <input
                type="text"
                id="schedule"
                class="form-control"
                placeholder="예: 매주 토요일 오후 2시"
                maxlength="80"
              />
            </div>

            <div class="form-group">
              <label class="form-label" for="location">모임 장소</label>
              <input
                type="text"
                id="location"
                class="form-control"
                placeholder="예: 강남 스타벅스 또는 온라인(Zoom)"
                maxlength="100"
              />
            </div>
          </div>
        </div>

        <!-- 모집 설정 섹션 -->
        <div class="form-section">
          <div class="form-section-title">모집 설정</div>
          <div style="display:flex;flex-direction:column;gap:16px;">
            <div class="form-group">
              <label class="form-label" for="max-members">최대 인원 <span class="required">*</span></label>
              <input
                type="number"
                id="max-members"
                class="form-control"
                placeholder="예: 6"
                min="2"
                max="50"
                required
              />
              <span class="form-hint">최소 2명, 최대 50명</span>
            </div>

            <div class="form-group">
              <label class="form-label" for="tags">태그</label>
              <input
                type="text"
                id="tags"
                class="form-control"
                placeholder="예: Python, 알고리즘, 코딩테스트 (쉼표로 구분)"
                maxlength="200"
              />
              <span class="form-hint">쉼표(,)로 구분해서 입력하세요</span>
            </div>
          </div>
        </div>

        <p id="error-msg" class="form-error" style="display:none;margin-bottom:12px;"></p>

        <div style="display:flex;gap:12px;">
          <a href="dashboard.html" class="btn btn-secondary" style="flex:1;justify-content:center;">취소</a>
          <button type="submit" class="btn btn-primary" style="flex:2;" id="submit-btn">
            스터디 개설하기
          </button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { requireAuth, logoutUser, renderNavUser } from "./js/auth.js";
    import { createStudy, getMyStudies } from "./js/studies.js";
    import { generateStudyDescription } from "./js/gemini.js";
    import { showToast, showLoading, hideLoading } from "./js/utils.js";

    const MAX_STUDIES = 5;
    let currentUser = null;

    async function init() {
      showLoading();
      const user = await requireAuth();
      if (!user) return;
      currentUser = user;
      renderNavUser(user);

      try {
        const myStudies = await getMyStudies(user.uid);
        const remaining = MAX_STUDIES - myStudies.length;
        const quotaText = document.getElementById("quota-text");

        if (remaining <= 0) {
          quotaText.textContent = "0개 (최대 5개 도달)";
          document.getElementById("submit-btn").disabled = true;
          document.getElementById("quota-badge").style.background = "rgba(239,68,68,0.1)";
          document.getElementById("quota-badge").style.color = "var(--danger)";
          showToast("스터디는 최대 5개까지 개설할 수 있습니다.", "error");
        } else {
          quotaText.textContent = `${remaining}개 남음 (현재 ${myStudies.length}개)`;
        }
      } finally {
        hideLoading();
      }

      document.getElementById("logout-btn").addEventListener("click", () => logoutUser());
      document.getElementById("ai-gen-btn").addEventListener("click", handleAIGenerate);
      document.getElementById("create-form").addEventListener("submit", handleSubmit);
    }

    async function handleAIGenerate() {
      const title = document.getElementById("title").value.trim();
      const category = document.getElementById("category").value;

      if (!title) {
        showToast("스터디 제목을 먼저 입력해주세요.", "error");
        document.getElementById("title").focus();
        return;
      }
      if (!category) {
        showToast("카테고리를 먼저 선택해주세요.", "error");
        document.getElementById("category").focus();
        return;
      }

      const btn = document.getElementById("ai-gen-btn");
      btn.disabled = true;
      btn.innerHTML = `<span class="ai-icon">⏳</span><span>생성 중</span>`;
      showLoading();

      try {
        const desc = await generateStudyDescription(title, category);
        document.getElementById("description").value = desc;
        showToast("AI가 소개글을 작성했습니다! 필요하면 수정하세요.", "success");
      } catch (err) {
        console.error(err);
        showToast("AI 생성에 실패했습니다: " + err.message, "error");
      } finally {
        hideLoading();
        btn.disabled = false;
        btn.innerHTML = `<span class="ai-icon">✨</span><span>AI 생성</span>`;
      }
    }

    async function handleSubmit(e) {
      e.preventDefault();
      const title = document.getElementById("title").value.trim();
      const category = document.getElementById("category").value;
      const description = document.getElementById("description").value.trim();
      const schedule = document.getElementById("schedule").value.trim();
      const location = document.getElementById("location").value.trim();
      const maxMembers = parseInt(document.getElementById("max-members").value);
      const tagsRaw = document.getElementById("tags").value;
      const tags = tagsRaw.split(",").map(t => t.trim()).filter(Boolean);

      const errorMsg = document.getElementById("error-msg");
      errorMsg.style.display = "none";

      if (!title || !category || !description || !maxMembers) {
        errorMsg.textContent = "필수 항목을 모두 입력해주세요.";
        errorMsg.style.display = "block";
        return;
      }

      if (maxMembers < 2 || maxMembers > 50) {
        errorMsg.textContent = "최대 인원은 2~50명 사이여야 합니다.";
        errorMsg.style.display = "block";
        return;
      }

      const btn = document.getElementById("submit-btn");
      btn.disabled = true;
      btn.textContent = "개설 중...";
      showLoading();

      try {
        await createStudy(
          { title, category, description, schedule, location, maxMembers, tags },
          currentUser.uid,
          currentUser.displayName || currentUser.email
        );
        showToast("스터디가 성공적으로 개설되었습니다!", "success");
        setTimeout(() => window.location.href = "dashboard.html", 1200);
      } catch (err) {
        hideLoading();
        btn.disabled = false;
        btn.textContent = "스터디 개설하기";
        errorMsg.textContent = err.message || "스터디 개설에 실패했습니다.";
        errorMsg.style.display = "block";
      }
    }

    init();
  </script>
</body>
</html>
